        totalPages:
          type: number
        totalItems:
          type: number
        itemsPerPage:
          type: number
        hasNextPage:
          type: boolean
        hasPreviousPage:
          type: boolean

    Employee:
      type: object
      description: Employee object returned by the HR module.
      properties:
        id:
          type: string
          description: Internal employee ID
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        departmentId:
          type: string
          description: Department identifier
        position:
          type: string
        salary:
          type: number
        hireDate:
          type: string
          format: date
        status:
          type: string
          enum: [active, inactive, on_leave, terminated]

    EmployeeInput:
      type: object
      description: Input for creating a new employee.
      required:
        - firstName
        - lastName
        - email
        - position
        - salary
        - hireDate
