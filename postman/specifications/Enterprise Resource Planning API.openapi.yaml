openapi: 3.0.0
info:
  title: Enterprise Resource Planning API
  version: 1.0.0
  description: |
    # Enterprise Resource Planning API
    
    ## Overview
    
    The Enterprise Resource Planning (ERP) API is a comprehensive, monolithic application designed to streamline and integrate core business processes across your organization. This RESTful API provides a unified interface for managing critical business operations including human resources, financial management, supply chain operations, and inventory control.
    
    ## Main Features & Modules
    
    - **Human Resources**: Employee and department management
    - **Payroll**: Salary processing and tax calculations
    - **Accounting**: General ledger and financial transactions
    - **Finance**: Budgeting and financial reporting
    - **Billing**: Invoicing and customer billing
    - **Procurement**: Purchase orders and vendor management
    - **Supply Chain**: Shipments and logistics
    - **Inventory**: Stock tracking and management
    
    ## Authentication
    
    Most endpoints require token-based authentication. Include the authentication token in your request headers.
    
    **Endpoints NOT requiring authentication:**
    - `GET /health` - Health check endpoint
    - `GET /api` - API information endpoint
    - `GET /api/demo/*` - Demo data endpoints
  contact:
    email: api-support@yourcompany.com
  license:
    name: Proprietary
    url: https://yourcompany.com/license

servers:
  - url: '{baseUrl}'
    description: Configurable base URL
    variables:
      baseUrl:
        default: http://localhost:3001
        description: Base URL for the API (configure for different environments)

security:
  - bearerAuth: []

tags:
  - name: System
    description: System-level endpoints for health checks and API information
  - name: Demo Data
    description: Mock data endpoints for testing and development
  - name: Human Resources
    description: Employee and department management
  - name: Payroll
    description: Salary processing and tax calculations
  - name: Accounting
    description: General ledger and financial transactions
  - name: Finance
    description: Budgeting and financial reporting
  - name: Billing
    description: Invoicing and customer billing
  - name: Procurement
    description: Purchase orders and vendor management
  - name: Supply Chain
    description: Shipments and logistics
  - name: Inventory
    description: Stock tracking and management

paths:
  /health:
    get:
      tags:
        - System
      summary: Health Check
      description: Performs a health check on the ERP API service to verify that the system is operational and responding to requests.
      operationId: healthCheck
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [healthy, degraded, unhealthy]
                  timestamp:
                    type: string
                    format: date-time
                  uptime:
                    type: number
                  version:
                    type: string
        '503':
          description: Service is unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api:
    get:
      tags:
        - System
      summary: API Info
      description: Retrieves comprehensive information about the ERP API, including version details, system architecture, available modules, and their interdependencies.
      operationId: getApiInfo
      security: []
      responses:
        '200':
          description: API information retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  version:
                    type: string
                  description:
                    type: string
                  architecture:
                    type: string
                  modules:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        path:
                          type: string
                        description:
                          type: string
                        endpoints:
                          type: number
                  dependencies:
                    type: object
                  documentation:
                    type: string

  /api/mock-stats:
    get:
      tags:
        - System
      summary: Mock Stats
      description: Retrieves mock statistical data for demonstration and testing purposes.
      operationId: getMockStats
      security: []
      responses:
        '200':
          description: Mock statistics retrieved successfully
          content:
            application/json:
              schema:
                type: object

  /api/demo/employees:
    get:
      tags:
        - Demo Data
      summary: Get Demo Employees
      description: Retrieves mock employee data for demonstration, testing, and development purposes.
      operationId: getDemoEmployees
      security: []
      responses:
        '200':
          description: Demo employees retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Employee'

  /api/demo/departments:
    get:
      tags:
        - Demo Data
      summary: Get Demo Departments
      description: Retrieves mock department data for demonstration, testing, and development purposes.
      operationId: getDemoDepartments
      security: []
      responses:
        '200':
          description: Demo departments retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Department'

  /api/demo/payroll:
    get:
      tags:
        - Demo Data
      summary: Get Demo Payroll
      description: Retrieves mock payroll data for demonstration, testing, and development purposes.
      operationId: getDemoPayroll
      security: []
      responses:
        '200':
          description: Demo payroll retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Payroll'

  /api/hr/employees:
    get:
      tags:
        - Human Resources
      summary: Get All Employees
      description: Retrieves a list of all employees in the HR system with optional filtering by status.
      operationId: getAllEmployees
      parameters:
        - name: status
          in: query
          description: Filter by employee status
          schema:
            type: string
            enum: [active, inactive, on_leave, terminated]
      responses:
        '200':
          description: Employees retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Employee'
        '400':
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      tags:
        - Human Resources
      summary: Create Employee
      description: Creates a new employee record in the HR system.
      operationId: createEmployee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeInput'
      responses:
        '201':
          description: Employee created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Employee'
                  message:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          description: Employee with this email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/hr/employees/{id}:
    get:
      tags:
        - Human Resources
      summary: Get Employee by ID
      description: Retrieves detailed information about a specific employee by their unique employee ID.
      operationId: getEmployeeById
      parameters:
        - $ref: '#/components/parameters/EmployeeId'
      responses:
        '200':
          description: Employee retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    put:
      tags:
        - Human Resources
      summary: Update Employee
      description: Updates an existing employee's information in the HR system.
      operationId: updateEmployee
      parameters:
        - $ref: '#/components/parameters/EmployeeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeUpdate'
      responses:
        '200':
          description: Employee updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/hr/employees/{id}/promote:
    patch:
      tags:
        - Human Resources
      summary: Promote Employee
      description: Promotes an employee to a new position with an updated job title and salary increase.
      operationId: promoteEmployee
      parameters:
        - $ref: '#/components/parameters/EmployeeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - salaryIncrease
              properties:
                title:
                  type: string
                  description: The new job title/position
                salaryIncrease:
                  type: number
                  description: The amount to increase the salary by
                effectiveDate:
                  type: string
                  format: date
                notes:
                  type: string
      responses:
        '200':
          description: Employee promoted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/hr/employees/{id}/terminate:
    post:
      tags:
        - Human Resources
      summary: Terminate Employee
      description: Terminates an employee's employment in the HR system.
      operationId: terminateEmployee
      parameters:
        - $ref: '#/components/parameters/EmployeeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - terminationDate
              properties:
                terminationDate:
                  type: string
                  format: date
                reason:
                  type: string
                notes:
                  type: string
      responses:
        '200':
          description: Employee terminated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/hr/departments:
    get:
      tags:
        - Human Resources
      summary: Get All Departments
      description: Retrieves a list of all departments in the organization.
      operationId: getAllDepartments
      responses:
        '200':
          description: Departments retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Department'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      tags:
        - Human Resources
      summary: Create Department
      description: Creates a new department in the HR system.
      operationId: createDepartment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepartmentInput'
      responses:
        '201':
          description: Department created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/hr/departments/{id}:
    get:
      tags:
        - Human Resources
      summary: Get Department by ID
      description: Retrieves detailed information about a specific department by its unique identifier.
      operationId: getDepartmentById
      parameters:
        - name: id
          in: path
          required: true
          description: Department ID
          schema:
            type: string
      responses:
        '200':
          description: Department retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/payroll/process:
    post:
      tags:
        - Payroll
      summary: Process Payroll
      description: Processes payroll for a single employee for a specified pay period.
      operationId: processPayroll
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PayrollInput'
      responses:
        '201':
          description: Payroll processed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payroll'
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/payroll/process-batch:
    post:
      tags:
        - Payroll
      summary: Process Batch Payroll
      description: Processes payroll for all active employees in the organization for a specified pay period.
      operationId: processBatchPayroll
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - payPeriodStart
                - payPeriodEnd
              properties:
                payPeriodStart:
                  type: string
                  format: date
                payPeriodEnd:
                  type: string
                  format: date
                departmentId:
                  type: string
                excludeEmployees:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Batch payroll processed successfully
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/payroll/{id}/approve:
    post:
      tags:
        - Payroll
      summary: Approve Payroll
      description: Approves a pending payroll record, marking it ready for payment disbursement.
      operationId: approvePayroll
      parameters:
        - name: id
          in: path
          required: true
          description: Payroll record ID
          schema:
            type: string
      responses:
        '200':
          description: Payroll approved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payroll'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/hr/statistics:
    get:
      tags:
        - Human Resources
      summary: Get HR Statistics
      description: Retrieves aggregate HR statistics including employee counts, department totals, and hiring metrics.
      operationId: getHRStatistics
      responses:
        '200':
          description: HR statistics retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalEmployees:
                    type: number
                  activeEmployees:
                    type: number
                  totalDepartments:
                    type: number
                  averageSalary:
                    type: number
                  newHiresThisMonth:
                    type: number
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/payroll:
    get:
      tags:
        - Payroll
      summary: Get All Payroll Records
      description: Retrieves all payroll records with optional filters by status, employee, or pay period.
      operationId: getAllPayrollRecords
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, paid]
        - name: employeeId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Payroll records retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Payroll'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/payroll/{id}:
    get:
      tags:
        - Payroll
      summary: Get Payroll by ID
      description: Retrieves a specific payroll record by its unique identifier.
      operationId: getPayrollById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Payroll record retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payroll'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/payroll/employee/{id}:
    get:
      tags:
        - Payroll
      summary: Get Employee Payroll History
      description: Retrieves all payroll records for a specific employee.
      operationId: getEmployeePayrollHistory
      parameters:
        - name: id
          in: path
          required: true
          description: Employee ID
          schema:
            type: string
      responses:
        '200':
          description: Employee payroll history retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Payroll'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/accounting/journal-entries:
    post:
      tags:
        - Accounting
      summary: Create Journal Entry
      description: Creates a new accounting journal entry with debit/credit line items.
      operationId: createJournalEntry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - date
                - description
                - entries
              properties:
                date:
                  type: string
                  format: date
                description:
                  type: string
                entries:
                  type: array
                  items:
                    type: object
                    properties:
                      accountCode:
                        type: string
                      debit:
                        type: number
                      credit:
                        type: number
                totalDebit:
                  type: number
                totalCredit:
                  type: number
      responses:
        '201':
          description: Journal entry created successfully
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/accounting/transactions:
    get:
      tags:
        - Accounting
      summary: Get All Transactions
      description: Retrieves all accounting transactions.
      operationId: getAllTransactions
      responses:
        '200':
          description: Transactions retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/accounting/transactions/{id}:
    get:
      tags:
        - Accounting
      summary: Get Transaction by ID
      description: Retrieves a specific accounting transaction by ID.
      operationId: getTransactionById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Transaction retrieved successfully
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/accounting/general-ledger:
    get:
      tags:
        - Accounting
      summary: Get General Ledger
      description: Retrieves the general ledger showing all account balances.
      operationId: getGeneralLedger
      responses:
        '200':
          description: General ledger retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  accounts:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                        name:
                          type: string
                        balance:
                          type: number
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/accounting/trial-balance:
    get:
      tags:
        - Accounting
      summary: Get Trial Balance
      description: Retrieves the trial balance showing total debits and credits.
      operationId: getTrialBalance
      responses:
        '200':
          description: Trial balance retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  date:
                    type: string
                    format: date-time
                  totalDebits:
                    type: number
                  totalCredits:
                    type: number
                  balanced:
                    type: boolean
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/finance/budgets:
    get:
      tags:
        - Finance
      summary: Get All Budgets
      description: Retrieves all budget records.
      operationId: getAllBudgets
      responses:
        '200':
          description: Budgets retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      tags:
        - Finance
      summary: Create Budget
      description: Creates a new budget for a department and fiscal period.
      operationId: createBudget
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - departmentId
                - fiscalYear
                - allocatedAmount
              properties:
                departmentId:
                  type: string
                fiscalYear:
                  type: integer
                quarter:
                  type: integer
                allocatedAmount:
                  type: number
      responses:
        '201':
          description: Budget created successfully
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/finance/budgets/{id}:
    get:
      tags:
        - Finance
      summary: Get Budget by ID
      description: Retrieves a specific budget by its ID.
      operationId: getBudgetById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Budget retrieved successfully
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/finance/budgets/{id}/close:
    post:
      tags:
        - Finance
      summary: Close Budget
      description: Closes an active budget, preventing further spending.
      operationId: closeBudget
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Budget closed successfully
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/finance/budgets/{id}/utilization:
    get:
      tags:
        - Finance
      summary: Get Budget Utilization
      description: Retrieves utilization metrics for a specific budget.
      operationId: getBudgetUtilization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Budget utilization retrieved successfully
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/finance/departments/{id}/budget-summary:
    get:
      tags:
        - Finance
      summary: Get Department Budget Summary
      description: Retrieves the total budget summary for a specific department.
      operationId: getDepartmentBudgetSummary
      parameters:
        - name: id
          in: path
          required: true
          description: Department ID
          schema:
            type: string
      responses:
        '200':
          description: Department budget summary retrieved successfully
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/finance/reports:
    get:
      tags:
        - Finance
      summary: Generate Financial Report
      description: Generates a financial report of the specified type.
      operationId: generateFinancialReport
      parameters:
        - name: type
          in: query
          description: Report type
          schema:
            type: string
            enum: [summary, detailed, forecast]
            default: summary
      responses:
        '200':
          description: Financial report generated successfully
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/billing/invoices/{id}:
    get:
      tags:
        - Billing
      summary: Get Invoice by ID
      description: Retrieves a specific invoice by its ID.
      operationId: getInvoiceById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invoice retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/billing/invoices/{id}/send:
    post:
      tags:
        - Billing
      summary: Send Invoice
      description: Sends an invoice to the customer via email.
      operationId: sendInvoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invoice sent successfully
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/billing/invoices/{id}/payments:
    post:
      tags:
        - Billing
      summary: Record Payment
      description: Records a payment against an invoice.
      operationId: recordPayment
      parameters:
        - name: id
          in: path
          required: true
