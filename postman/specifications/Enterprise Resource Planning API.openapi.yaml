                  type: string
      responses:
        '200':
          description: Stock received successfully
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/inventory/low-stock:
    get:
      tags:
        - Inventory
      summary: Get Low Stock Items
      description: Retrieves items where quantity on hand is at or below the reorder point.
      operationId: getLowStockItems
      responses:
        '200':
          description: Low stock items retrieved successfully
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/inventory/valuation:
    get:
      tags:
        - Inventory
      summary: Get Inventory Valuation
      description: Retrieves the total monetary value of all inventory items.
      operationId: getInventoryValuation
      responses:
        '200':
          description: Inventory valuation retrieved successfully
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/inventory/categories:
    get:
      tags:
        - Inventory
      summary: Get Category Breakdown
      description: Retrieves a breakdown of inventory items and value by category.
      operationId: getCategoryBreakdown
      responses:
        '200':
          description: Category breakdown retrieved successfully
        '401':
          $ref: '#/components/responses/UnauthorizedError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token-based authentication. Include the token in the Authorization header.

  parameters:
    EmployeeId:
      name: id
      in: path
      required: true
      description: Unique employee identifier
      schema:
        type: string

  responses:
    UnauthorizedError:
      description: Authentication required or authentication failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
