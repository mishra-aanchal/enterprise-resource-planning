$kind: http-request
description: |-
  ## Purpose

  Creates a new department in the HR system. This endpoint allows HR managers and administrators to establish new organizational units, define their structure, assign managers, and allocate budgets.

  ## Authentication

  **Required Role:** `hr_manager` or `admin`

  **Authentication Type:** Bearer Token

  **Header:** `Authorization: Bearer {{authToken}}`

  ## Request Parameters

  ### Headers

  | Header | Type | Required | Description |
  |--------|------|----------|-------------|
  | Content-Type | string | Yes | Must be `application/json` |
  | Authorization | string | Yes | Bearer token for authentication |

  ### Body Parameters (JSON)

  | Parameter | Type | Required | Description |
  |-----------|------|----------|-------------|
  | name | string | Yes | Department name (must be unique) |
  | code | string | Yes | Department code/abbreviation (e.g., "ENG", "HR") |
  | managerId | string | No | ID of the employee who manages this department |
  | budget | number | No | Annual department budget |
  | description | string | No | Department description and purpose |
  | location | string | No | Physical location of the department |

  ### Example Request Body

  ```json
  {
    "name": "Engineering",
    "code": "ENG",
    "managerId": "emp-456",
    "budget": 5000000,
    "description": "Software development and technical operations",
    "location": "Building A, Floor 3"
  }
  ```

  ### Example Request

  ```
  POST {{baseUrl}}/api/hr/departments
  Content-Type: application/json

  {
    "name": "Engineering",
    "code": "ENG",
    "managerId": "emp-456",
    "budget": 5000000
  }
  ```

  ## Response

  ### Success Response (201 Created)

  Returns the newly created department object:

  ```json
  {
    "id": "dept-001",
    "name": "Engineering",
    "code": "ENG",
    "managerId": "emp-456",
    "budget": 5000000,
    "description": "Software development and technical operations",
    "location": "Building A, Floor 3",
    "employeeCount": 0,
    "createdAt": "2024-01-15T10:30:00Z",
    "updatedAt": "2024-01-15T10:30:00Z"
  }
  ```

  ### Error Responses

  **400 Bad Request** - Invalid input data
  ```json
  {
    "error": "Validation failed",
    "details": [
      "Department name is required",
      "Department code must be 2-5 characters"
    ]
  }
  ```

  **401 Unauthorized** - Missing or invalid authentication token
  ```json
  {
    "error": "Authentication required"
  }
  ```

  **403 Forbidden** - Insufficient permissions
  ```json
  {
    "error": "Insufficient permissions. Requires hr_manager or admin role."
  }
  ```

  **409 Conflict** - Department name or code already exists
  ```json
  {
    "error": "Department with this name or code already exists"
  }
  ```

  ## Notes

  - Department names and codes must be unique across the organization
  - The `managerId` must reference an existing employee
  - Budget should be a positive number
  - The `employeeCount` field is automatically calculated and cannot be set manually
url: "{{baseUrl}}/api/hr/departments"
method: POST
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Engineering",
      "code": "ENG",
      "managerId": "emp-456",
      "budget": 500000
    }
order: 1000
