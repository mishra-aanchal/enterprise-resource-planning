$kind: http-request
description: |-
  ## Purpose

  Updates an existing employee's information in the HR system. This endpoint allows HR managers and administrators to modify employee details such as position, salary, department assignment, contact information, and other employment-related data.

  ## Authentication

  **Required Role:** `hr_manager` or `admin`

  **Authentication Type:** Bearer Token

  **Header:** `Authorization: Bearer {{authToken}}`

  ## Request Parameters

  ### Path Parameters

  | Parameter | Type | Required | Description |
  |-----------|------|----------|-------------|
  | id | string | Yes | The unique identifier of the employee to update |

  ### Headers

  | Header | Type | Required | Description |
  |--------|------|----------|-------------|
  | Content-Type | string | Yes | Must be `application/json` |
  | Authorization | string | Yes | Bearer token for authentication |

  ### Body Parameters (JSON)

  All body parameters are optional. Only include the fields you want to update:

  | Parameter | Type | Required | Description |
  |-----------|------|----------|-------------|
  | firstName | string | No | Employee's first name |
  | lastName | string | No | Employee's last name |
  | email | string | No | Employee's email address (must be unique) |
  | position | string | No | Employee's job title/position |
  | salary | number | No | Annual salary amount (positive number) |
  | departmentId | string | No | ID of the department the employee belongs to |
  | phoneNumber | string | No | Employee's contact phone number |
  | status | string | No | Employment status (active, inactive, on_leave, terminated) |

  ### Example Request Body

  ```json
  {
    "position": "Senior Software Engineer",
    "salary": 95000,
    "departmentId": "dept-002"
  }
  ```

  ### Example Request

  ```
  PUT {{baseUrl}}/api/hr/employees/emp-789
  Content-Type: application/json

  {
    "position": "Senior Software Engineer",
    "salary": 95000
  }
  ```

  ## Response

  ### Success Response (200 OK)

  Returns the updated employee object:

  ```json
  {
    "employee-id": "emp-789",
    "firstName": "John",
    "lastName": "Doe",
    "email": "john.doe@example.com",
    "departmentId": "dept-002",
    "position": "Senior Software Engineer",
    "salary": 95000,
    "hireDate": "2024-01-15",
    "phoneNumber": "(555) 123-4567",
    "status": "active",
    "createdAt": "2024-01-15T10:30:00Z",
    "updatedAt": "2024-06-15T14:20:00Z"
  }
  ```

  ### Error Responses

  **400 Bad Request** - Invalid input data
  ```json
  {
    "error": "Validation failed",
    "details": [
      "Salary must be a positive number",
      "Invalid email format"
    ]
  }
  ```

  **404 Not Found** - Employee does not exist
  ```json
  {
    "error": "Employee not found",
    "employeeId": "emp-789"
  }
  ```

  **401 Unauthorized** - Missing or invalid authentication token
  ```json
  {
    "error": "Authentication required"
  }
  ```

  **403 Forbidden** - Insufficient permissions
  ```json
  {
    "error": "Insufficient permissions. Requires hr_manager or admin role."
  }
  ```

  **409 Conflict** - Email already exists (if updating email)
  ```json
  {
    "error": "Employee with this email already exists"
  }
  ```

  ## Notes

  - Only the fields provided in the request body will be updated
  - The `updatedAt` timestamp will be automatically updated
  - The `id`, `createdAt`, and `hireDate` fields cannot be modified
  - Use the "Promote Employee" endpoint for promotions with salary increases
  - Use the "Terminate Employee" endpoint to change status to terminated
url: "{{baseUrl}}/api/hr/employees/{{lastCreatedEmployeeId}}"
method: PUT
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  id: "{{lastCreatedEmployeeId}}"
body:
  type: json
  content: |-
    {
      "position": "Senior Software Engineer",
      "salary": 85000,
      "departmentId": "dept-456"
    }
order: 4000
