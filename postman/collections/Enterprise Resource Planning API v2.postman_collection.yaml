          - type: beforeRequest
            code: >-
              // Validate shipmentId before proceeding

              let shipmentId = pm.collectionVariables.get("shipmentId");

              if (!shipmentId || shipmentId === "") {
                  console.error("ERROR: shipmentId is missing or empty. Please run the 'Create Shipment' request first to generate a shipment ID.");
                  throw new Error("shipmentId is required. Run the 'Create Shipment' request first.");
              }


              // Generate values for Update Shipment request if not already set


              // Check and generate carrier if empty

              let carrier = pm.collectionVariables.get("carrier");

              if (!carrier || carrier === "") {
                  const carriers = ["FedEx", "UPS", "DHL", "USPS"];
                  carrier = carriers[Math.floor(Math.random() * carriers.length)];
                  pm.collectionVariables.set("carrier", carrier);
                  console.log("Generated carrier:", carrier);
              }


              // Check and generate tracking number if empty

              let trackingNumber = pm.collectionVariables.get("trackingNumber");

              if (!trackingNumber || trackingNumber === "") {
                  trackingNumber = Math.floor(Math.random() * 9000000000000) + 1000000000000;
                  pm.collectionVariables.set("trackingNumber", trackingNumber.toString());
                  console.log("Generated tracking number:", trackingNumber);
              }


              // Check and generate estimated delivery date if empty

              let estimatedDeliveryDate =
              pm.collectionVariables.get("estimatedDeliveryDate");

              if (!estimatedDeliveryDate || estimatedDeliveryDate === "") {
                  const today = new Date();
                  const deliveryDays = Math.floor(Math.random() * 3) + 5; // Random between 5-7 days
                  const deliveryDate = new Date(today);
                  deliveryDate.setDate(deliveryDate.getDate() + deliveryDays);
                  estimatedDeliveryDate = deliveryDate.toISOString().split('T')[0];
                  pm.collectionVariables.set("estimatedDeliveryDate", estimatedDeliveryDate);
                  console.log("Generated estimated delivery date:", estimatedDeliveryDate);
              }


              // Log the values being used

              console.log("Using carrier:",
              pm.collectionVariables.get("carrier"));

              console.log("Using tracking number:",
              pm.collectionVariables.get("trackingNumber"));

              console.log("Using estimated delivery date:",
              pm.collectionVariables.get("estimatedDeliveryDate"));

              console.log("Using shipment ID:",
              pm.collectionVariables.get("shipmentId"));
