      - id: f9c13992-b970-47e2-b2e7-7d68dd1b58a6
        name: Create Shipment
        url: '{{baseUrl}}/api/v2/supply-chain/shipments?page=1&limit=20'
        method: POST
        headers:
          - key: Content-Type
            value: application/json
        queryParams:
          - key: page
            value: '1'
          - key: limit
            value: '20'
        body:
          type: text
          content: |-
            {
              "orderId": "{{orderId}}",
              "carrier": "{{carrier}}",
              "trackingNumber": "{{trackingNumber}}",
              "shipDate": "{{shipDate}}",
              "estimatedDeliveryDate": "{{estimatedDeliveryDate}}",
              "origin": {
                "address": "{{originAddress}}",
                "city": "{{originCity}}",
                "state": "{{originState}}",
                "zipCode": "{{originZipCode}}"
              },
              "destination": {
                "address": "{{destinationAddress}}",
                "city": "{{destinationCity}}",
                "state": "{{destinationState}}",
                "zipCode": "{{destinationZipCode}}"
              }
            }
        type: http
        scripts:
          - type: beforeRequest
            code: >-
              // Generate unique order ID using timestamp

              pm.collectionVariables.set("orderId", "order_" + Date.now());


              // Randomly select a carrier

              const carriers = ["FedEx", "UPS", "DHL", "USPS"];

              const randomCarrier = carriers[Math.floor(Math.random() *
              carriers.length)];

              pm.collectionVariables.set("carrier", randomCarrier);


              // Generate random tracking number (13 digits)

              const trackingNumber = Math.floor(Math.random() * 9000000000000) +
              1000000000000;

              pm.collectionVariables.set("trackingNumber",
              trackingNumber.toString());


              // Set shipDate to today's date (ISO format)

              const today = new Date();

              pm.collectionVariables.set("shipDate",
              today.toISOString().split('T')[0]);


              // Set estimatedDeliveryDate to 5-7 days from today

              const deliveryDays = Math.floor(Math.random() * 3) + 5; // Random
              between 5-7

              const deliveryDate = new Date(today);

              deliveryDate.setDate(deliveryDate.getDate() + deliveryDays);

              pm.collectionVariables.set("estimatedDeliveryDate",
              deliveryDate.toISOString().split('T')[0]);


              // Generate random origin address data

              const originStreets = ["123 Warehouse St", "456 Distribution Ave",
              "789 Logistics Blvd", "321 Supply Chain Dr"];

              const originCities = ["Los Angeles", "Chicago", "Dallas",
              "Atlanta"];

              const originStates = ["CA", "IL", "TX", "GA"];

              const originZips = ["90001", "60601", "75201", "30301"];


              const originIndex = Math.floor(Math.random() *
              originStreets.length);

              pm.collectionVariables.set("originAddress",
              originStreets[originIndex]);

              pm.collectionVariables.set("originCity",
              originCities[originIndex]);

              pm.collectionVariables.set("originState",
              originStates[originIndex]);

              pm.collectionVariables.set("originZipCode",
              originZips[originIndex]);


              // Generate random destination address data

              const destStreets = ["456 Customer Ave", "789 Buyer Ln", "321
              Client St", "654 Recipient Rd"];

              const destCities = ["New York", "Boston", "Seattle", "Miami"];

              const destStates = ["NY", "MA", "WA", "FL"];

              const destZips = ["10001", "02101", "98101", "33101"];


              const destIndex = Math.floor(Math.random() * destStreets.length);

              pm.collectionVariables.set("destinationAddress",
              destStreets[destIndex]);

              pm.collectionVariables.set("destinationCity",
              destCities[destIndex]);

              pm.collectionVariables.set("destinationState",
              destStates[destIndex]);

              pm.collectionVariables.set("destinationZipCode",
              destZips[destIndex]);
            language: text/javascript
          - type: afterResponse
            code: >-
              // Extract shipment ID from response with error handling

              try {
                  const responseData = pm.response.json();
                  
                  // Log the full response for debugging
                  console.log("Full response:", responseData);
                  
                  let shipmentId = null;
                  
                  // Check common response structures for shipment ID
                  if (responseData.id) {
                      shipmentId = responseData.id;
                      console.log("Shipment ID found at response.id:", shipmentId);
                  } else if (responseData.data && responseData.data.id) {
                      shipmentId = responseData.data.id;
                      console.log("Shipment ID found at response.data.id:", shipmentId);
                  } else if (responseData.shipmentId) {
                      shipmentId = responseData.shipmentId;
                      console.log("Shipment ID found at response.shipmentId:", shipmentId);
                  } else if (responseData.data && responseData.data.shipmentId) {
                      shipmentId = responseData.data.shipmentId;
                      console.log("Shipment ID found at response.data.shipmentId:", shipmentId);
                  } else if (responseData.shipment && responseData.shipment.id) {
                      shipmentId = responseData.shipment.id;
                      console.log("Shipment ID found at response.shipment.id:", shipmentId);
                  }
                  
                  // Save to collection variable if found
                  if (shipmentId) {
                      pm.collectionVariables.set("shipmentId", shipmentId);
                      console.log("Shipment ID saved to collection variable 'shipmentId':", shipmentId);
                      
                      // Test to verify the ID was extracted
                      pm.test("Shipment ID extracted successfully", function () {
                          pm.expect(shipmentId).to.not.be.null;
                          pm.expect(shipmentId).to.not.be.undefined;
                      });
                  } else {
                      console.warn("Warning: Could not find shipment ID in response. Please check the response structure.");
                      console.log("Response keys:", Object.keys(responseData));
                      
                      pm.test("Shipment ID extraction", function () {
                          pm.expect.fail("Shipment ID not found in response");
                      });
                  }
                  
              } catch (error) {
                  console.error("Error extracting shipment ID:", error);
                  pm.test("Shipment ID extraction error", function () {
                      pm.expect.fail("Error occurred: " + error.message);
                  });
              }


              // Comprehensive tests for Create Shipment endpoint

              pm.test("Status code is 201 Created", function () {
                  pm.response.to.have.status(201);
              });


              pm.test("Response time is acceptable (under 2000ms)", function ()
              {
                  pm.expect(pm.response.responseTime).to.be.below(2000);
              });


              pm.test("Response has correct Content-Type", function () {
                  pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
              });


              pm.test("Response has success flag set to true", function () {
                  const responseData = pm.response.json();
                  pm.expect(responseData.success).to.be.true;
              });


              pm.test("Response contains data object", function () {
                  const responseData = pm.response.json();
                  pm.expect(responseData).to.have.property("data");
                  pm.expect(responseData.data).to.be.an("object");
              });


              pm.test("Shipment data contains required fields", function () {
                  const shipmentData = pm.response.json().data;
                  pm.expect(shipmentData).to.have.property("id");
                  pm.expect(shipmentData).to.have.property("orderId");
                  pm.expect(shipmentData).to.have.property("carrier");
                  pm.expect(shipmentData).to.have.property("trackingNumber");
                  pm.expect(shipmentData).to.have.property("shipDate");
                  pm.expect(shipmentData).to.have.property("status");
                  pm.expect(shipmentData).to.have.property("origin");
                  pm.expect(shipmentData).to.have.property("destination");
              });


              pm.test("Shipment ID has correct format", function () {
                  const shipmentData = pm.response.json().data;
                  pm.expect(shipmentData.id).to.be.a("string");
                  pm.expect(shipmentData.id).to.match(/^ship-/);
              });


              pm.test("Order ID matches request", function () {
                  const shipmentData = pm.response.json().data;
                  const requestOrderId = pm.collectionVariables.get("orderId");
                  pm.expect(shipmentData.orderId).to.equal(requestOrderId);
              });


              pm.test("Carrier matches request", function () {
                  const shipmentData = pm.response.json().data;
                  const requestCarrier = pm.collectionVariables.get("carrier");
                  pm.expect(shipmentData.carrier).to.equal(requestCarrier);
              });


              pm.test("Shipment status is pending", function () {
                  const shipmentData = pm.response.json().data;
                  pm.expect(shipmentData.status).to.equal("pending");
              });


              pm.test("Origin address contains required fields", function () {
                  const origin = pm.response.json().data.origin;
                  pm.expect(origin).to.have.property("address");
                  pm.expect(origin).to.have.property("city");
                  pm.expect(origin).to.have.property("state");
                  pm.expect(origin).to.have.property("zipCode");
              });


              pm.test("Destination address contains required fields", function
              () {
                  const destination = pm.response.json().data.destination;
                  pm.expect(destination).to.have.property("address");
                  pm.expect(destination).to.have.property("city");
                  pm.expect(destination).to.have.property("state");
                  pm.expect(destination).to.have.property("zipCode");
              });


              pm.test("Response includes timestamp", function () {
                  const responseData = pm.response.json();
                  pm.expect(responseData).to.have.property("timestamp");
                  pm.expect(responseData.timestamp).to.be.a("string");
              });
            language: text/javascript
      - id: 283f31c0-fceb-40dc-b171-d33917710e91
        name: Get Shipment by ID
        url: '{{baseUrl}}/api/v2/supply-chain/shipments/{{shipmentId}}'
        method: GET
        type: http
        scripts:
          - type: beforeRequest
            code: "// ============================================\n// Pre-request Script: Get Shipment by ID\n// ============================================\n// This script validates required variables before making the API request\n// to ensure the request has the best chance of success.\n\nconsole.log(\"========== Pre-request Validation Started ==========\");\nconsole.log(\"Request:\", pm.info.requestName);\nconsole.log(\"Timestamp:\", new Date().toISOString());\n\n// ============================================\n// 1. Validate baseUrl Configuration\n// ============================================\nconst baseUrl = pm.collectionVariables.get(\"baseUrl\") || pm.environment.get(\"baseUrl\");\n\nif (!baseUrl || baseUrl.trim() === \"\") {\n    console.error(\"❌ ERROR: baseUrl is not configured\");\n    console.error(\"Please set the 'baseUrl' variable in your collection or environment.\");\n    console.error(\"Example: http://localhost:3001 or https://api.example.com\");\n    throw new Error(\"baseUrl variable is required. Please configure it in your collection or environment variables.\");\n}\n\n// Validate baseUrl format (should be a valid URL)\nconst urlPattern = /^https?:\\/\\/.+/i;\nif (!urlPattern.test(baseUrl.trim())) {\n    console.error(\"❌ ERROR: baseUrl format is invalid\");\n    console.error(\"Current value:\", baseUrl);\n    console.error(\"Expected format: http://hostname or https://hostname\");\n    throw new Error(\"baseUrl must be a valid URL starting with http:// or https://\");\n}\n\nconsole.log(\"✅ baseUrl is configured:\", baseUrl);\n\n// ============================================\n// 2. Validate shipmentId Exists\n// ============================================\nconst shipmentId = pm.collectionVariables.get(\"shipmentId\") || pm.environment.get(\"shipmentId\");\n\nif (!shipmentId || shipmentId.trim() === \"\") {\n    console.error(\"❌ ERROR: shipmentId is not set\");\n    console.error(\"The 'shipmentId' variable is required to fetch shipment details.\");\n    console.error(\"\");\n    console.error(\"How to fix:\");\n    console.error(\"  1. Run the 'Create Shipment' request first to generate a new shipment\");\n    console.error(\"  2. Or manually set the 'shipmentId' collection variable\");\n    console.error(\"  3. Or set the 'shipmentId' environment variable\");\n    throw new Error(\"shipmentId collection variable is required. Run 'Create Shipment' first to populate this variable.\");\n}\n\nconsole.log(\"✅ shipmentId is set:\", shipmentId);\n\n// ============================================\n// 3. Validate shipmentId Format\n// ============================================\n// Expected format: \"ship-\" prefix followed by numeric/alphanumeric identifier\nconst shipmentIdPattern = /^ship-[\\w.-]+$/;\n\nif (!shipmentIdPattern.test(shipmentId.trim())) {\n    console.warn(\"⚠️ WARNING: shipmentId format may be invalid\");\n    console.warn(\"Current value:\", shipmentId);\n    console.warn(\"Expected format: ship-<identifier> (e.g., ship-1767981358.709342)\");\n    console.warn(\"\");\n    console.warn(\"The request will proceed, but may return a 404 if the ID is invalid.\");\n    // Note: We warn but don't throw here to allow flexibility for different ID formats\n} else {\n    console.log(\"✅ shipmentId format is valid\");\n}\n\n// ============================================\n// 4. Log Final Request Details\n// ============================================\nconst fullUrl = `${baseUrl}/api/v2/supply-chain/shipments/${shipmentId}`;\nconsole.log(\"\");\nconsole.log(\"\U0001F4CB Request Summary:\");\nconsole.log(\"  - Method: GET\");\nconsole.log(\"  - Base URL:\", baseUrl);\nconsole.log(\"  - Shipment ID:\", shipmentId);\nconsole.log(\"  - Full URL:\", fullUrl);\nconsole.log(\"\");\nconsole.log(\"========== Pre-request Validation Complete ==========\");"
            language: text/javascript
          - type: afterResponse
            code: >-
              // Handle 404 status code (shipment not found)

              if (pm.response.code === 404) {
                  pm.test("Status code is 404 - Shipment not found", function () {
                      pm.response.to.have.status(404);
                  });
                  
                  pm.test("404 response has error message", function () {
                      try {
                          const errorData = pm.response.json();
                          pm.expect(errorData).to.have.property('success');
                          pm.expect(errorData.success).to.be.false;
                          pm.expect(errorData).to.have.property('error');
                      } catch (e) {
                          console.warn("Could not parse 404 error response as JSON:", e.message);
                      }
                  });
                  
                  console.warn("Shipment not found. The shipmentId may be invalid or the shipment may have been deleted.");
                  return; // Exit early for 404 responses
              }


              // Validate response status

              pm.test("Status code is 200", function () {
                  pm.response.to.have.status(200);
              });


              // Validate response time

              pm.test("Response time is acceptable (under 2000ms)", function ()
              {
                  pm.expect(pm.response.responseTime).to.be.below(2000);
              });


              // Validate Content-Type

              pm.test("Response has correct Content-Type", function () {
                  pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
              });


              // Parse response with try-catch for invalid JSON handling

              let jsonData;

              try {
                  jsonData = pm.response.json();
              } catch (parseError) {
                  pm.test("Response is valid JSON", function () {
                      pm.expect.fail("Failed to parse response as JSON: " + parseError.message);
                  });
                  console.error("JSON Parse Error:", parseError.message);
                  console.log("Raw response body:", pm.response.text());
                  return; // Exit early if JSON parsing fails
              }


              // Validate response structure

              pm.test("Response has success property", function () {
                  pm.expect(jsonData).to.have.property('success');
                  pm.expect(jsonData.success).to.be.true;
              });


              pm.test("Response has data property", function () {
                  pm.expect(jsonData).to.have.property('data');
                  pm.expect(jsonData.data).to.be.an('object');
              });


              pm.test("Response includes timestamp", function () {
                  pm.expect(jsonData).to.have.property('timestamp');
                  pm.expect(jsonData.timestamp).to.be.a('string');
              });


              // Validate shipment data structure

              if (jsonData.data) {
                  pm.test("Shipment has required fields", function () {
                      const shipment = jsonData.data;
                      pm.expect(shipment).to.have.property('id');
                      pm.expect(shipment).to.have.property('orderId');
                      pm.expect(shipment).to.have.property('carrier');
                      pm.expect(shipment).to.have.property('trackingNumber');
                      pm.expect(shipment).to.have.property('status');
                      pm.expect(shipment).to.have.property('shipDate');
                      pm.expect(shipment).to.have.property('estimatedDeliveryDate');
                      pm.expect(shipment).to.have.property('origin');
                      pm.expect(shipment).to.have.property('destination');
                  });
                  
                  pm.test("Shipment ID matches requested ID", function () {
                      const requestedId = pm.collectionVariables.get("shipmentId");
                      pm.expect(jsonData.data.id).to.equal(requestedId);
                  });
                  
                  pm.test("Shipment ID has correct format", function () {
                      pm.expect(jsonData.data.id).to.be.a('string');
                      pm.expect(jsonData.data.id).to.match(/^ship-/);
                  });
                  
                  pm.test("Status is a valid value", function () {
                      const validStatuses = ['pending', 'in_transit', 'delivered', 'cancelled'];
                      pm.expect(validStatuses).to.include(jsonData.data.status);
                  });
                  
                  // Validate origin address with null/undefined checks
                  pm.test("Origin address contains required fields", function () {
                      const origin = jsonData.data.origin;
                      
                      // Check if origin exists and is an object
                      pm.expect(origin, "Origin should exist").to.exist;
                      pm.expect(origin, "Origin should be an object").to.be.an('object');
                      
                      if (origin && typeof origin === 'object') {
                          pm.expect(origin).to.have.property('address');
                          pm.expect(origin).to.have.property('city');
                          pm.expect(origin).to.have.property('state');
                          pm.expect(origin).to.have.property('zipCode');
                      }
                  });
                  
                  // Validate destination address with null/undefined checks
                  pm.test("Destination address contains required fields", function () {
                      const destination = jsonData.data.destination;
                      
                      // Check if destination exists and is an object
                      pm.expect(destination, "Destination should exist").to.exist;
                      pm.expect(destination, "Destination should be an object").to.be.an('object');
                      
                      if (destination && typeof destination === 'object') {
                          pm.expect(destination).to.have.property('address');
                          pm.expect(destination).to.have.property('city');
                          pm.expect(destination).to.have.property('state');
                          pm.expect(destination).to.have.property('zipCode');
                      }
                  });
                  
                  // Log shipment details
                  console.log("Retrieved Shipment ID:", jsonData.data.id);
                  console.log("Shipment Status:", jsonData.data.status);
                  console.log("Carrier:", jsonData.data.carrier);
                  console.log("Tracking Number:", jsonData.data.trackingNumber);
              }
