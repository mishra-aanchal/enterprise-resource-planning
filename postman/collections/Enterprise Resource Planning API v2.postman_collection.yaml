          - type: beforeRequest
            code: >-
              // Arrays of sample data for random generation

              const firstNames = [
                  "James", "Mary", "John", "Patricia", "Robert", "Jennifer", "Michael", "Linda",
                  "William", "Barbara", "David", "Elizabeth", "Richard", "Susan", "Joseph", "Jessica",
                  "Thomas", "Sarah", "Charles", "Karen", "Christopher", "Nancy", "Daniel", "Lisa",
                  "Matthew", "Betty", "Anthony", "Margaret", "Mark", "Sandra", "Donald", "Ashley",
                  "Steven", "Kimberly", "Paul", "Emily", "Andrew", "Donna", "Joshua", "Michelle"
              ];


              const lastNames = [
                  "Smith", "Johnson", "Williams", "Brown", "Jones", "Garcia", "Miller", "Davis",
                  "Rodriguez", "Martinez", "Hernandez", "Lopez", "Gonzalez", "Wilson", "Anderson", "Thomas",
                  "Taylor", "Moore", "Jackson", "Martin", "Lee", "Perez", "Thompson", "White",
                  "Harris", "Sanchez", "Clark", "Ramirez", "Lewis", "Robinson", "Walker", "Young",
                  "Allen", "King", "Wright", "Scott", "Torres", "Nguyen", "Hill", "Flores"
              ];


              const positions = [
                  "Software Engineer",
                  "Senior Software Engineer",
                  "Product Manager",
                  "Data Analyst",
                  "UX Designer",
                  "DevOps Engineer",
                  "Quality Assurance Engineer",
                  "Business Analyst",
                  "Project Manager",
                  "Frontend Developer",
                  "Backend Developer",
                  "Full Stack Developer",
                  "Data Scientist",
                  "Marketing Manager",
                  "Sales Representative",
                  "HR Specialist",
                  "Financial Analyst",
                  "Customer Success Manager",
                  "Technical Writer",
                  "System Administrator"
              ];


              // Function to get random item from array

              function getRandomItem(array) {
                  return array[Math.floor(Math.random() * array.length)];
              }


              // Generate random values

              const firstName = getRandomItem(firstNames);

              const lastName = getRandomItem(lastNames);

              const position = getRandomItem(positions);


              // Generate email based on firstName and lastName

              const email =
              `${firstName.toLowerCase()}.${lastName.toLowerCase()}@example.com`;


              // Set environment variables

              pm.environment.set("firstName", firstName);

              pm.environment.set("lastName", lastName);

              pm.environment.set("email", email);

              pm.environment.set("position", position);


              console.log("Generated employee data:");

              console.log("First Name:", firstName);

              console.log("Last Name:", lastName);

              console.log("Email:", email);

              console.log("Position:", position);
            language: text/javascript
          - type: afterResponse
            code: |-
              // Extract employee ID from response and save to environment
              const responseData = pm.response.json();

              // Check common response structures for the employee ID
              let employeeId;
              if (responseData.id) {
                  employeeId = responseData.id;
              } else if (responseData.data && responseData.data.id) {
                  employeeId = responseData.data.id;
              } else if (responseData.employee && responseData.employee.id) {
                  employeeId = responseData.employee.id;
              }

              // Save the employee ID to environment variable
              if (employeeId) {
                  pm.environment.set("employeeId", employeeId);
                  console.log("Employee ID saved to environment:", employeeId);
              } else {
                  console.log("Warning: Could not find employee ID in response");
              }
            language: text/javascript
