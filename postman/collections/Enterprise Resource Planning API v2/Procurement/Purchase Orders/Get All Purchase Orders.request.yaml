$kind: http-request
description: Get a paginated list of all purchase orders with optional status filter.
url: '{{baseUrl}}/api/v2/procurement/purchase-orders'
method: GET
queryParams:
  - key: page
    value: '1'
    description: Page number (1-indexed)
  - key: limit
    value: '20'
    description: Items per page
  - key: status
    value: ''
    description: 'Filter: draft, pendingApproval, approved, placed, received, cancelled'
    disabled: true
order: 1000
