$kind: http-request
description: Get a paginated list of all vendors with optional status filter.
url: '{{baseUrl}}/api/v2/procurement/vendors'
method: GET
queryParams:
  - key: page
    value: '1'
    description: Page number (1-indexed)
  - key: limit
    value: '20'
    description: Items per page
  - key: status
    value: ''
    description: 'Filter: active, inactive, suspended'
    disabled: true
order: 1000
