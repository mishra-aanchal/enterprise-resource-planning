$kind: http-request
description: Get a paginated list of all shipments with optional status and carrier filters.
url: '{{baseUrl}}/api/v2/supply-chain/shipments'
method: GET
queryParams:
  - key: page
    value: '1'
    description: Page number (1-indexed)
  - key: limit
    value: '20'
    description: Items per page
  - key: status
    value: ''
    description: 'Filter: pending, dispatched, inTransit, delivered, cancelled'
    disabled: true
  - key: carrier
    value: ''
    description: Filter by carrier name
    disabled: true
order: 1000
