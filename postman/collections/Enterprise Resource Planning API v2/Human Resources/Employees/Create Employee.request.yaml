$kind: http-request
description: |-
  Create a new employee record. Returns 201 on success.

  ### Response Schema (201 Created)

  ``` json
  {
    "success": true,
    "data": {
      "employee-id": "emp_1234567890",
      "employeeId": "EMP-2024-001",
      "firstName": "Jane",
      "lastName": "Smith",
      "email": "jane.smith@example.com",
      "department": "Engineering",
      "departmentId": "dept-001",
      "position": "Software Engineer",
      "salary": 95000.00,
      "hireDate": "2024-01-15",
      "status": "active",
      "phoneNumber": "+1-555-0123",
      "createdAt": "2024-01-15T10:30:00Z",
      "updatedAt": "2024-01-15T10:30:00Z"
    }
  }

   ```
url: '{{baseUrl}}/api/v2/hr/employees'
method: POST
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "firstName": "Jane",
      "lastName": "Smith",
      "email": "jane.smith@example.com",
      "department": "Engineering",
      "departmentId": "dept-001",
      "position": "Software Engineer",
      "salary": 95000.00,
      "hireDate": "2024-01-15",
      "phoneNumber": "+1-555-0123"
    }
order: 3000
