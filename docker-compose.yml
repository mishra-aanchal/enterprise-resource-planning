services:
  erp-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: erp-api
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      # Python/Flask Configuration
      FLASK_APP: src/app.py
      FLASK_ENV: production
      PYTHONPATH: /app
      PORT: 3004

      # API Configuration
      API_VERSION: v2
      BASE_URL: http://localhost:3004

      # Authentication (if needed in future)
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-24h}
      AUTH_TOKEN: ${AUTH_TOKEN:-your-bearer-token-here}

      # Database — Neon connection string.
      # Copy from Neon console: Project → Connection Details → Connection string.
      DATABASE_URL: ${DATABASE_URL}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # CORS Configuration
      CORS_ORIGIN: ${CORS_ORIGIN:-*}

    volumes:
      # Mount logs directory (optional)
      - ./logs:/app/logs

    networks:
      - erp-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis Cache (optional - uncomment if needed)
  # redis:
