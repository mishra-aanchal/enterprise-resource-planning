version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erp-api
    ports:
      - "3004:3004"
    environment:
      - FLASK_ENV=development
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=erp_user
      - DB_PASSWORD=erp_password
      - DB_DATABASE=erp_monolith
    depends_on:
      db:
        condition: service_healthy
    networks:
      - erp-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: erp-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3004
    networks:
      - erp-network

  db:
    image: postgres:14-alpine
    container_name: erp-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=erp_user
      - POSTGRES_PASSWORD=erp_password
      - POSTGRES_DB=erp_monolith
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_user -d erp_monolith"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp-network

networks:
  erp-network:
    driver: bridge

volumes:
  pgdata:
